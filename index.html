<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nahum UPY 2026</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0a0a0a;
            color: #f5f5f0;
            max-width: 600px;
            margin: 60px auto;
            padding: 0 24px;
        }

        h1 {
            color: #c9a84c;
        }

        h2 {
            color: #c9a84c;
            font-size: 0.85rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-top: 32px;
        }

        p,
        li {
            color: rgba(245, 245, 240, 0.7);
            line-height: 1.8;
        }

        ul {
            padding-left: 20px;
        }
    </style>
</head>

<body>

    <h1>Tu Nombre Completo</h1>

    <h2>Favorite Food</h2>
    <p>Tu comida favorita aquí</p>

    <h2>Hobbies</h2>
    <ul>
        <li>Hobby 1</li>
        <li>Hobby 2</li>
        <li>Hobby 3</li>
    </ul>

    <h2>Fun Fact</h2>
    <p>Un dato curioso sobre ti aquí</p>

</body>

</html>
